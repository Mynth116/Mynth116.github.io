<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;500&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #2c3e50;
            --accent-color: #3498db;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow: hidden;
        }

        /* 磨砂玻璃质感容器 */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            text-align: center;
            max-width: 90%;
            width: 500px;
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
            color: #1a1a1a;
        }

        p {
            font-size: 1rem;
            font-weight: 300;
            margin-bottom: 0.8rem;
            line-height: 1.8;
            opacity: 0.8;
        }

        /* 计科生的小彩蛋：代码字体装饰 */
        .cs-tag {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(52, 152, 219, 0.1);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        /* 入场动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 底部装饰线 */
        .divider {
            width: 40px;
            height: 2px;
            background: var(--accent-color);
            margin: 2rem auto 0;
            border-radius: 1px;
        }
    </style>
</head>
<body>

    <div class="glass-card">
    <nav style="margin-bottom: 2rem; display: flex; justify-content: center; gap: 20px;">
        <a href="index.html" class="nav-link">首页</a>
        <a href="notes.html" class="nav-link">学习笔记</a>
        <a href="projects.html" class="nav-link">课程作业</a>
    </nav>
    
    <style>
        .nav-link {
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0.6;
            transition: opacity 0.3s;
            border-bottom: 2px solid transparent;
        }
        .nav-link:hover {
            opacity: 1;
            border-bottom: 2px solid var(--accent-color);
        }
    </style>
        <h1>欢迎来到我的个人网站</h1>
        <p>这是我用 GitHub Pages 搭建的第一个站点！</p>
        <p>一名 <span class="cs-tag">计科生</span>，这里未来会存放我的项目和笔记。</p>
        <div class="divider"></div>
    </div>

</body>
</html>
