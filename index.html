<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的名字 | 个人主页</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #2c3e50;
            --accent-color: #3498db;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 磨砂玻璃质感容器 */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            text-align: center;
            max-width: 90%;
            width: 700px;
            overflow: hidden; /* 保证内部导航栏贴合边缘 */
            animation: fadeIn 1.2s ease-out;
        }

        /* 导航栏样式 */
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.95rem;
            font-weight: 500;
            opacity: 0.7;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover {
            opacity: 1;
            color: var(--accent-color);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 50%;
            background-color: var(--accent-color);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* 内容板块样式 */
        .content {
            padding: 3rem 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
            color: #1a1a1a;
        }

        p {
            font-size: 1.05rem;
            font-weight: 300;
            margin-bottom: 1rem;
            line-height: 1.8;
            opacity: 0.8;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: var(--accent-color);
            margin: 2rem auto 0;
            border-radius: 2px;
        }

        /* 计科生小彩蛋 */
        .cs-tag {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(52, 152, 219, 0.1);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="glass-card">
        <nav class="nav-bar">
            <a href="index.html" class="nav-link">首页</a>
            <a href="notes.html" class="nav-link">学习笔记</a>
            <a href="projects.html" class="nav-link">课程作业</a>
        </nav>

        <main class="content">
            <h1>欢迎来到我的个人网站</h1>
            <p>这是我用 GitHub Pages 搭建的第一个站点！</p>
            <p>一名 <span class="cs-tag">计科生</span>，这里未来会存放我的项目和笔记。</p>
            <p>点击上方导航栏，可以浏览我的学习产出。</p>
            <div class="divider"></div>
        </main>
    </div>

</body>
</html>
