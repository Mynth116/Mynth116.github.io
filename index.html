<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mynth | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #2c3e50;
            --accent-color: #3498db;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            text-align: center;
            max-width: 90%;
            width: 700px;
            overflow: hidden;
            animation: fadeIn 1.2s ease-out;
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 40px; /* 增加间距让英文排版更舒展 */
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-color);
            font-size: 1rem;
            font-weight: 500;
            opacity: 0.6;
            transition: all 0.3s ease;
            font-family: 'JetBrains Mono', monospace; /* 英文使用等宽字体更有科技感 */
        }

        .nav-link:hover {
            opacity: 1;
            color: var(--accent-color);
            transform: translateY(-2px);
        }

        .content { padding: 4rem 2rem; }
        h1 { font-size: 2rem; margin-bottom: 1.5rem; color: #1a1a1a; }
        p { font-size: 1.05rem; font-weight: 300; margin-bottom: 1rem; line-height: 1.8; }
        
        .cs-tag {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(52, 152, 219, 0.1);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <nav class="nav-bar">
            <a href="index.html" class="nav-link">Home</a>
            <a href="notes.html" class="nav-link">Notes</a>
            <a href="projects.html" class="nav-link">Projects</a>
        </nav>

        <main class="content">
            <h1>欢迎来到我的个人网站</h1>
            <p>这是我用 GitHub Pages 搭建的第一个站点！</p>
            <p>一名 <span class="cs-tag">计科生</span>，这里未来会存放我的项目和笔记。</p>
            <p>Click the navigation bar above to explore my work.</p>
        </main>
    </div>

</body>
</html>
